services:
  gallery-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gallery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-gallery_hub}
    volumes:
      - gallery_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gallery} -d ${POSTGRES_DB:-gallery_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  gallery-minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Allow browser PUT/GET from the gallery app's public origin.
      # Set to ${PUBLIC_BASE_URL} (single origin) or '*' if it's behind multiple hostnames.
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-${PUBLIC_BASE_URL}}
    volumes:
      - gallery_miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9000/minio/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  gallery-migrate:
    image: ghcr.io/divass/gallery-hub:latest
    restart: "no"
    command: ["npx", "tsx", "scripts/migrate.ts"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      gallery-postgres:
        condition: service_healthy
    networks:
      - internal

  gallery-app:
    image: ghcr.io/divass/gallery-hub:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-gallery}
      MINIO_FORCE_PATH_STYLE: "true"
      SESSION_PASSWORD: ${SESSION_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      WIDGET_TOKEN: ${WIDGET_TOKEN:-}
    ports:
      - "3000:3000"
    depends_on:
      gallery-postgres:
        condition: service_healthy
      gallery-minio:
        condition: service_healthy
      gallery-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  gallery-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: gallery-worker:local
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      NODE_ENV: production
    depends_on:
      gallery-postgres:
        condition: service_healthy
      gallery-migrate:
        condition: service_completed_successfully
      gallery-minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # imgproxy — on-demand image resizing + format negotiation. Reads originals
  # straight from gallery-minio over the internal Docker network, caches the
  # resized output for IMGPROXY_TTL (1y), and signs every URL to prevent
  # arbitrary-source-fetch abuse. See src/lib/imgproxy.ts for the URL format.
  #
  # IMGPROXY_KEY / IMGPROXY_SALT MUST be 32+ hex chars each. Generate with:
  #   openssl rand -hex 32
  # ---------------------------------------------------------------------------
  gallery-imgproxy:
    image: ghcr.io/imgproxy/imgproxy:latest
    restart: unless-stopped
    environment:
      IMGPROXY_KEY: ${IMGPROXY_KEY}
      IMGPROXY_SALT: ${IMGPROXY_SALT}
      # S3 reads — point at the in-cluster MinIO. AWS_* credentials are the
      # same access key the app uses (read access is sufficient).
      IMGPROXY_USE_S3: "true"
      IMGPROXY_S3_ENDPOINT: ${IMGPROXY_S3_ENDPOINT:-http://gallery-minio:9000}
      IMGPROXY_S3_REGION: ${MINIO_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
      # In dev MinIO is on a loopback-style hostname inside Docker. imgproxy
      # blocks loopback sources by default for SSRF protection — fine for
      # prod (separate Cloudflare Tunnel hostname) but needs an opt-in here.
      IMGPROXY_ALLOW_LOOPBACK_SOURCE_ADDRESSES: "true"
      # Format negotiation: WEBP enforced (every browser supports it), AVIF
      # only when the client signals it via Accept.
      IMGPROXY_ENFORCE_WEBP: "true"
      IMGPROXY_ENFORCE_AVIF: "false"
      IMGPROXY_QUALITY: ${IMGPROXY_QUALITY:-82}
      # Fastest reasonable AVIF speed (0=best/slow, 9=fastest). 8 keeps
      # cold-hit latency under ~300ms for typical 1600px web variants.
      IMGPROXY_AVIF_SPEED: ${IMGPROXY_AVIF_SPEED:-8}
      # 1-year immutable cache — URL is content-addressed via signature so a
      # different processing chain produces a different URL anyway.
      IMGPROXY_TTL: ${IMGPROXY_TTL:-31536000}
      # Surface ETags so CDN intermediaries can cheaply revalidate.
      IMGPROXY_USE_ETAG: "true"
    ports:
      - "8080:8080"
    depends_on:
      gallery-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Analytics (PostHog self-hosted). Optional — start with:
  #   docker compose up -d posthog-pg posthog-clickhouse posthog-redis posthog
  # First boot: visit http://localhost:8000 and create the admin account.
  # ---------------------------------------------------------------------------
  posthog-pg:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTHOG_PG_USER:-posthog}
      POSTGRES_PASSWORD: ${POSTHOG_PG_PASSWORD:-posthog}
      POSTGRES_DB: ${POSTHOG_PG_DB:-posthog}
    volumes:
      - posthog_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTHOG_PG_USER:-posthog} -d ${POSTHOG_PG_DB:-posthog}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  posthog-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - posthog_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  posthog-clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - posthog_chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  posthog:
    image: posthog/posthog:latest
    restart: unless-stopped
    environment:
      # Required PostHog wiring. SECRET_KEY must be 32+ random chars.
      DATABASE_URL: postgres://${POSTHOG_PG_USER:-posthog}:${POSTHOG_PG_PASSWORD:-posthog}@posthog-pg:5432/${POSTHOG_PG_DB:-posthog}
      REDIS_URL: redis://posthog-redis:6379/
      CLICKHOUSE_HOST: posthog-clickhouse
      CLICKHOUSE_DATABASE: posthog
      CLICKHOUSE_VERIFY: "false"
      SITE_URL: ${POSTHOG_SITE_URL:-http://localhost:8000}
      SECRET_KEY: ${POSTHOG_SECRET_KEY:-change-me-to-a-32-plus-character-random-string}
      # Behind Cloudflare Tunnel in prod — honors X-Forwarded-For for IPs.
      IS_BEHIND_PROXY: ${POSTHOG_IS_BEHIND_PROXY:-true}
      DISABLE_SECURE_SSL_REDIRECT: ${POSTHOG_DISABLE_SECURE_SSL_REDIRECT:-true}
    ports:
      - "8000:8000"
    depends_on:
      posthog-pg:
        condition: service_healthy
      posthog-redis:
        condition: service_healthy
      posthog-clickhouse:
        condition: service_healthy
    networks:
      - internal

volumes:
  gallery_pgdata:
  gallery_miniodata:
  posthog_pgdata:
  posthog_redisdata:
  posthog_chdata:

networks:
  internal:
    driver: bridge
