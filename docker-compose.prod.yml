# ─────────────────────────────────────────────────────────────────────────────
# Production stack for gallery-hub.
#
# Hardening vs. docker-compose.yml (dev):
#   * Pinned image tags (no :latest)
#   * Healthchecks on every service
#   * restart: unless-stopped everywhere
#   * Per-service CPU/RAM limits via deploy.resources
#   * Read-only root filesystems + tmpfs /tmp where supported
#   * security_opt: no-new-privileges:true
#   * json-file log rotation (50m × 5 files)
#   * Named volumes with explicit names (Portainer-friendly)
#   * NO host port bindings — only cloudflared exposes traffic externally
#
# Boot order:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# All secrets come from ${VAR} interpolation against .env.prod (gitignored).
# ─────────────────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

x-security: &default-security
  - no-new-privileges:true

services:
  # ──────────────────────────────────────────────────────────────────────────
  # Gallery primary Postgres
  # ──────────────────────────────────────────────────────────────────────────
  gallery-postgres:
    image: postgres:16.5-alpine
    container_name: gallery-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gallery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-gallery_hub}
    volumes:
      - gallery_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gallery} -d ${POSTGRES_DB:-gallery_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
    networks:
      - gallery-internal

  # ──────────────────────────────────────────────────────────────────────────
  # MinIO object store
  # ──────────────────────────────────────────────────────────────────────────
  gallery-minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: gallery-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      # Browser CORS — MinIO must allow the gallery's public origin for direct
      # presigned PUT/GET. Set to your PUBLIC_BASE_URL (no trailing slash).
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN}
      # Browser redirects sent by MinIO must use the public hostname. Required —
      # no default, because a wrong value here causes MinIO to refuse to start.
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:?MINIO_BROWSER_REDIRECT_URL is required (e.g. https://minio.gallery.example.com)}
      MINIO_SERVER_URL: ${MINIO_PUBLIC_ENDPOINT}
      # MC_HOST_<alias> seeds the bundled `mc` client with an auth-ready
      # alias without us shelling in to run `mc alias set`. Lets the
      # healthcheck below call `mc ready local` straight away.
      MC_HOST_local: http://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@localhost:9000
    volumes:
      - gallery_miniodata_prod:/data
    healthcheck:
      # Recent minio/minio releases dropped `wget` and `curl` from the
      # ubi-micro base. `mc ready` is the official health probe and is
      # bundled in every minio image — it talks over the local socket and
      # needs no external tooling. Requires MC_HOST_local set above.
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
    networks:
      - gallery-internal

  # ──────────────────────────────────────────────────────────────────────────
  # One-shot DB migrations. Exits 0 on success — depended on by app & worker.
  # ──────────────────────────────────────────────────────────────────────────
  gallery-migrate:
    image: ${GALLERY_APP_IMAGE:-ghcr.io/vatsonio/gallery-hub:latest}
    container_name: gallery-migrate
    restart: "no"
    command: ["npx", "tsx", "scripts/migrate.ts"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      # MinIO env so the migrate one-shot can also provision the bucket —
      # /api/health checks bucket existence and would flag the app
      # unhealthy on first deploy otherwise.
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://gallery-minio:9000}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      MINIO_BUCKET: ${MINIO_BUCKET:-gallery}
      MINIO_FORCE_PATH_STYLE: "true"
      # ADMIN_* lets the migrate one-shot also seed the bootstrap admin /
      # owner row — first run promotes them to 'owner', re-runs are
      # password-only updates.
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      gallery-postgres:
        condition: service_healthy
      gallery-minio:
        condition: service_healthy
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - gallery-internal

  # ──────────────────────────────────────────────────────────────────────────
  # Gallery Next.js app
  # ──────────────────────────────────────────────────────────────────────────
  gallery-app:
    image: ${GALLERY_APP_IMAGE:-ghcr.io/vatsonio/gallery-hub:latest}
    container_name: gallery-app
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://gallery-minio:9000}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:?MINIO_PUBLIC_ENDPOINT is required}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      MINIO_BUCKET: ${MINIO_BUCKET:-gallery}
      MINIO_FORCE_PATH_STYLE: "true"
      SESSION_PASSWORD: ${SESSION_PASSWORD:?SESSION_PASSWORD is required}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
      WIDGET_TOKEN: ${WIDGET_TOKEN:-}
      POSTHOG_KEY: ${POSTHOG_KEY:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-}
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-}
      POSTHOG_DASHBOARD_URL: ${POSTHOG_DASHBOARD_URL:-}
      APP_VERSION: ${APP_VERSION:-prod}
    depends_on:
      gallery-postgres:
        condition: service_healthy
      gallery-minio:
        condition: service_healthy
      gallery-migrate:
        condition: service_completed_successfully
    healthcheck:
      # Explicit 127.0.0.1 — BusyBox wget on Alpine tries ::1 first when
      # asked for `localhost` and Next listens on 0.0.0.0 (v4 only). The
      # probe got Connection refused and marked the container unhealthy
      # even though /api/health was serving 200 over v4.
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    security_opt: *default-security
    read_only: true
    tmpfs:
      - /tmp:size=256M,mode=1777
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.5"
    networks:
      - gallery-internal

  # ──────────────────────────────────────────────────────────────────────────
  # pg-boss worker — derivatives, reapers, etc.
  # ──────────────────────────────────────────────────────────────────────────
  gallery-worker:
    image: ${GALLERY_WORKER_IMAGE:-ghcr.io/vatsonio/gallery-hub-worker:latest}
    container_name: gallery-worker
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://gallery-minio:9000}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      MINIO_BUCKET: ${MINIO_BUCKET:-gallery}
      MINIO_FORCE_PATH_STYLE: "true"
      # How many derivative jobs this worker process runs concurrently. 6
      # is the dev default (workers/index.ts), see DEFAULT_WORKER_BATCH_SIZE.
      # Bumping above ~8 starts contending with sharp's libvips threads on
      # typical 2-vCPU prod boxes — scale horizontally via deploy.replicas
      # below instead.
      WORKER_BATCH_SIZE: ${WORKER_BATCH_SIZE:-6}
    depends_on:
      gallery-postgres:
        condition: service_healthy
      gallery-minio:
        condition: service_healthy
      gallery-migrate:
        condition: service_completed_successfully
    healthcheck:
      # No HTTP surface — assert the node process is alive.
      test: ["CMD-SHELL", "pgrep -f 'node .*dist/workers/index.js' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt: *default-security
    read_only: true
    tmpfs:
      - /tmp:size=128M,mode=1777
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - gallery-internal

  # ──────────────────────────────────────────────────────────────────────────
  # imgproxy — on-demand image resizing + format negotiation. Reads originals
  # from gallery-minio over the internal network, signs every URL via
  # HMAC-SHA256 (IMGPROXY_KEY + IMGPROXY_SALT) so arbitrary-source-fetch is
  # blocked, caches output for IMGPROXY_TTL (1y).
  #
  # Cloudflare Tunnel exposes this on https://img.gallery.example.com — the
  # browser hits it directly, the app + worker stay internal. See
  # docs/deploy.md for the tunnel hostname wiring.
  # ──────────────────────────────────────────────────────────────────────────
  gallery-imgproxy:
    image: ghcr.io/imgproxy/imgproxy:v3.27.2
    container_name: gallery-imgproxy
    restart: unless-stopped
    environment:
      IMGPROXY_KEY: ${IMGPROXY_KEY:?IMGPROXY_KEY is required}
      IMGPROXY_SALT: ${IMGPROXY_SALT:?IMGPROXY_SALT is required}
      IMGPROXY_USE_S3: "true"
      IMGPROXY_S3_ENDPOINT: ${IMGPROXY_S3_ENDPOINT:-http://gallery-minio:9000}
      IMGPROXY_S3_REGION: ${MINIO_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER}}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      # MinIO is on a service-name hostname inside Docker — counts as a
      # loopback target from imgproxy's SSRF heuristic. Whitelist it here.
      IMGPROXY_ALLOW_LOOPBACK_SOURCE_ADDRESSES: "true"
      IMGPROXY_ENFORCE_WEBP: "true"
      IMGPROXY_ENFORCE_AVIF: "false"
      IMGPROXY_QUALITY: ${IMGPROXY_QUALITY:-82}
      IMGPROXY_AVIF_SPEED: ${IMGPROXY_AVIF_SPEED:-8}
      # Progressive JPEG + interlaced PNG — browser paints a low-res pass
      # before the final bytes land. Costs ~5% extra JPEG bytes; the
      # feel-faster win on slow networks is worth it.
      IMGPROXY_JPEG_PROGRESSIVE: ${IMGPROXY_JPEG_PROGRESSIVE:-true}
      IMGPROXY_PNG_INTERLACED: ${IMGPROXY_PNG_INTERLACED:-true}
      # 10 parallel encodes (default 4). On a 2-vCPU VPS this is fine —
      # libvips uses ~1.5 cores per encode, so 10 simultaneous requests
      # interleave nicely. Lower this if you observe sustained 100% CPU.
      IMGPROXY_CONCURRENCY: ${IMGPROXY_CONCURRENCY:-10}
      IMGPROXY_TTL: ${IMGPROXY_TTL:-31536000}
      IMGPROXY_USE_ETAG: "true"
      # Defence-in-depth: don't honour client-side hints that could be used
      # to amplify bandwidth (e.g. force-encoding a 100MP AVIF). The size
      # bounds are already capped in src/lib/imgproxy.ts.
      IMGPROXY_MAX_SRC_RESOLUTION: ${IMGPROXY_MAX_SRC_RESOLUTION:-50}
    depends_on:
      gallery-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    security_opt: *default-security
    read_only: true
    tmpfs:
      - /tmp:size=128M,mode=1777
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
    networks:
      - gallery-internal

  # ──────────────────────────────────────────────────────────────────────────
  # PostHog stack — analytics
  # ──────────────────────────────────────────────────────────────────────────
  posthog-pg:
    image: postgres:16.5-alpine
    container_name: posthog-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTHOG_PG_USER:-posthog}
      POSTGRES_PASSWORD: ${POSTHOG_PG_PASSWORD:?POSTHOG_PG_PASSWORD is required}
      POSTGRES_DB: ${POSTHOG_PG_DB:-posthog}
    volumes:
      - posthog_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTHOG_PG_USER:-posthog} -d ${POSTHOG_PG_DB:-posthog}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - gallery-internal

  posthog-redis:
    image: redis:7.4-alpine
    container_name: posthog-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - posthog_redisdata_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - gallery-internal

  posthog-clickhouse:
    image: clickhouse/clickhouse-server:24.10-alpine
    container_name: posthog-clickhouse
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - posthog_chdata_prod:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: "2.0"
    networks:
      - gallery-internal

  posthog:
    image: posthog/posthog:release-1.61.0
    container_name: posthog
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTHOG_PG_USER:-posthog}:${POSTHOG_PG_PASSWORD}@posthog-pg:5432/${POSTHOG_PG_DB:-posthog}
      REDIS_URL: redis://posthog-redis:6379/
      CLICKHOUSE_HOST: posthog-clickhouse
      CLICKHOUSE_DATABASE: posthog
      CLICKHOUSE_VERIFY: "false"
      SITE_URL: ${POSTHOG_SITE_URL:-https://posthog.gallery.example.com}
      SECRET_KEY: ${POSTHOG_SECRET_KEY:?POSTHOG_SECRET_KEY is required}
      IS_BEHIND_PROXY: ${POSTHOG_IS_BEHIND_PROXY:-true}
      DISABLE_SECURE_SSL_REDIRECT: ${POSTHOG_DISABLE_SECURE_SSL_REDIRECT:-true}
      TRUST_ALL_PROXIES: ${POSTHOG_TRUST_ALL_PROXIES:-true}
    depends_on:
      posthog-pg:
        condition: service_healthy
      posthog-redis:
        condition: service_healthy
      posthog-clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8000/_health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: "2.0"
    networks:
      - gallery-internal

  # ──────────────────────────────────────────────────────────────────────────
  # Encrypted Postgres backup runner. Cron fires deploy/scripts/pg-backup.sh
  # daily; dumps land in gallery_backups_prod (mounted at /backups). See
  # docs/backup.md for restore procedure.
  # ──────────────────────────────────────────────────────────────────────────
  gallery-backup:
    build:
      context: .
      dockerfile: deploy/backup/Dockerfile
    image: ${GALLERY_BACKUP_IMAGE:-ghcr.io/vatsonio/gallery-hub-backup:latest}
    container_name: gallery-backup
    restart: unless-stopped
    environment:
      BACKUP_ROLE: pg
      SCHEDULE_PG: ${BACKUP_SCHEDULE_PG:-0 3 * * *}
      POSTGRES_HOST: gallery-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-gallery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-gallery_hub}
      BACKUP_GPG_PASSPHRASE: ${BACKUP_GPG_PASSPHRASE:?BACKUP_GPG_PASSPHRASE is required}
      BACKUP_DIR: /backups
      KEEP_DAILY: ${BACKUP_KEEP_DAILY:-7}
      KEEP_WEEKLY: ${BACKUP_KEEP_WEEKLY:-4}
      KEEP_MONTHLY: ${BACKUP_KEEP_MONTHLY:-6}
    volumes:
      - gallery_backups_prod:/backups
    depends_on:
      gallery-postgres:
        condition: service_healthy
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - gallery-internal

  # ──────────────────────────────────────────────────────────────────────────
  # MinIO → cold-storage mirror. Reads BACKUP_TARGET (b2|r2|local) and runs
  # `mc mirror` on a cron. Append-only by design (no --remove) so a
  # compromised primary can't cascade into the offsite copy. See
  # docs/backup.md.
  # ──────────────────────────────────────────────────────────────────────────
  gallery-mirror:
    build:
      context: .
      dockerfile: deploy/backup/Dockerfile
    image: ${GALLERY_BACKUP_IMAGE:-ghcr.io/vatsonio/gallery-hub-backup:latest}
    container_name: gallery-mirror
    restart: unless-stopped
    environment:
      BACKUP_ROLE: mirror
      SCHEDULE_MIRROR: ${BACKUP_SCHEDULE_MIRROR:-0 4 * * *}
      # Source — always the in-cluster MinIO. Uses the same access keys the
      # app uses (read access is sufficient).
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://gallery-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      MINIO_BUCKET: ${MINIO_BUCKET:-gallery}
      # Cold-storage destination selector.
      BACKUP_TARGET: ${BACKUP_TARGET:-local}
      # Backblaze B2 (when BACKUP_TARGET=b2)
      B2_KEY_ID: ${B2_KEY_ID:-}
      B2_APP_KEY: ${B2_APP_KEY:-}
      B2_BUCKET: ${B2_BUCKET:-}
      B2_ENDPOINT: ${B2_ENDPOINT:-}
      # Cloudflare R2 (when BACKUP_TARGET=r2)
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_BUCKET: ${R2_BUCKET:-}
      # Local (when BACKUP_TARGET=local) — written into /mirror inside the
      # container, which maps to gallery_mirror_prod.
      LOCAL_MIRROR_DIR: /mirror
    volumes:
      - gallery_backups_prod:/backups
      - gallery_mirror_prod:/mirror
    depends_on:
      gallery-minio:
        condition: service_healthy
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - gallery-internal

  # ──────────────────────────────────────────────────────────────────────────
  # Cloudflare Tunnel — the only path traffic reaches the stack.
  # Two run modes:
  #   1. Token mode (simpler): set CF_TUNNEL_TOKEN in .env.prod.
  #   2. Credentials-file mode: mount deploy/cloudflared/credentials.json and
  #      config.yml and override `command` below to `tunnel run gallery-hub`.
  # ──────────────────────────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:2024.10.1
    container_name: gallery-cloudflared
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${CF_TUNNEL_TOKEN}"]
    environment:
      TUNNEL_METRICS: 0.0.0.0:2000
    volumes:
      - ./deploy/cloudflared:/etc/cloudflared:ro
    depends_on:
      gallery-app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:2000/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - gallery-internal

  # ──────────────────────────────────────────────────────────────────────────
  # Watchtower — auto-pull + recreate for app/worker on every new GHCR push.
  # Bypasses Portainer's "Re-pull image" bug (issue #13173). Limited to
  # containers carrying the `com.centurylinklabs.watchtower.enable=true`
  # label so it never touches postgres/minio/cloudflared/posthog (those
  # stay on pinned tags and need explicit operator action to upgrade).
  # ──────────────────────────────────────────────────────────────────────────
  gallery-watchtower:
    image: containrrr/watchtower:latest
    container_name: gallery-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-300}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      TZ: UTC
    security_opt: *default-security
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - gallery-internal

volumes:
  gallery_pgdata_prod:
    name: gallery_pgdata_prod
  gallery_miniodata_prod:
    name: gallery_miniodata_prod
  gallery_backups_prod:
    name: gallery_backups_prod
  gallery_mirror_prod:
    name: gallery_mirror_prod
  posthog_pgdata_prod:
    name: posthog_pgdata_prod
  posthog_redisdata_prod:
    name: posthog_redisdata_prod
  posthog_chdata_prod:
    name: posthog_chdata_prod

networks:
  gallery-internal:
    name: gallery-internal
    driver: bridge
