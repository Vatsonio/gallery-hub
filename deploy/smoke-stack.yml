# Local smoke-test stack. Mirrors prod (portainer-stack.yml) but with
# locally-built images and no Cloudflare Tunnel. Ports are bound to
# localhost so curl + browser tests can hit the app directly.
services:
  gallery-postgres:
    image: postgres:16.5-alpine
    container_name: smoke-gallery-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - smoke_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - smoke

  gallery-minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: smoke-gallery-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_CORS_ALLOW_ORIGIN: ${PUBLIC_BASE_URL}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL}
      MINIO_SERVER_URL: ${MINIO_PUBLIC_ENDPOINT}
      MC_HOST_local: http://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@localhost:9000
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - smoke_miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - smoke

  gallery-migrate:
    image: gallery-hub:test
    container_name: smoke-gallery-migrate
    restart: "no"
    command: ["npx", "tsx", "scripts/migrate.ts"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MINIO_ENDPOINT: http://gallery-minio:9000
      MINIO_REGION: us-east-1
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      MINIO_BUCKET: gallery
      MINIO_FORCE_PATH_STYLE: "true"
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      gallery-postgres:
        condition: service_healthy
      gallery-minio:
        condition: service_healthy
    networks:
      - smoke

  gallery-app:
    image: gallery-hub:test
    container_name: smoke-gallery-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      MINIO_ENDPOINT: http://gallery-minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_REGION: us-east-1
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      MINIO_BUCKET: gallery
      MINIO_FORCE_PATH_STYLE: "true"
      SESSION_PASSWORD: ${SESSION_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      PUBLIC_IMGPROXY_URL: ${PUBLIC_IMGPROXY_URL}
      IMGPROXY_URL: http://gallery-imgproxy:8080
      IMGPROXY_KEY: ${IMGPROXY_KEY}
      IMGPROXY_SALT: ${IMGPROXY_SALT}
      # APP_VERSION inherits the Dockerfile build-arg. CI bakes
      # sha-${{ github.sha }} into the image; local rebuilds should pass
      # --build-arg APP_VERSION=sha-$(git rev-parse HEAD) so the admin
      # sidebar shows the real commit instead of a literal "smoke".
      # An explicit override here would beat the baked value at runtime.
    ports:
      - "3000:3000"
    depends_on:
      gallery-postgres:
        condition: service_healthy
      gallery-minio:
        condition: service_healthy
      gallery-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - smoke

  gallery-worker:
    image: gallery-hub-worker:test
    container_name: smoke-gallery-worker
    restart: "on-failure:3"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      MINIO_ENDPOINT: http://gallery-minio:9000
      MINIO_REGION: us-east-1
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      MINIO_BUCKET: gallery
      MINIO_FORCE_PATH_STYLE: "true"
      WORKER_BATCH_SIZE: "2"
    depends_on:
      gallery-postgres:
        condition: service_healthy
      gallery-minio:
        condition: service_healthy
      gallery-migrate:
        condition: service_completed_successfully
    networks:
      - smoke

  gallery-imgproxy:
    image: ghcr.io/imgproxy/imgproxy:v3.27.2
    container_name: smoke-gallery-imgproxy
    restart: unless-stopped
    environment:
      IMGPROXY_KEY: ${IMGPROXY_KEY}
      IMGPROXY_SALT: ${IMGPROXY_SALT}
      IMGPROXY_USE_S3: "true"
      IMGPROXY_S3_ENDPOINT: http://gallery-minio:9000
      IMGPROXY_S3_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER}}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      IMGPROXY_ALLOW_LOOPBACK_SOURCE_ADDRESSES: "true"
      IMGPROXY_ENFORCE_WEBP: "true"
      IMGPROXY_QUALITY: "82"
    ports:
      - "8080:8080"
    depends_on:
      gallery-minio:
        condition: service_healthy
    networks:
      - smoke

  smoke-cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: smoke-cloudflared
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN}
    depends_on:
      - gallery-app
    networks:
      - smoke

volumes:
  smoke_pgdata:
  smoke_miniodata:

networks:
  smoke:
    driver: bridge
